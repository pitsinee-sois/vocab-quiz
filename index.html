// ===== รวมทุกหน้าไว้ในตัวเดียว =====
const pages = [page1, page2, page3, page4, page5, page6, page7, page8];

// ===== CONTROL =====
let currentPage = 0;
let submitted = false;
let totalScore = 0;
let wrongList = [];

// ===== LOAD =====
function loadPage(){
  let vocab = pages[currentPage];

  document.getElementById("title").innerText =
    "Vocabulary Quiz - Page " + (currentPage + 1);

  let html = "";

  vocab.forEach((v,i)=>{
    html += `
    <div class="item">
      <div class="word">${i+1}. ${v[0]} =</div>
      <input id="q${i}">
      <span id="fb${i}"></span>
    </div>`;
  });

  document.getElementById("quiz").innerHTML = html;
  document.getElementById("result").innerText = "";
  submitted = false;
}

// ===== CHECK =====
function similar(a,b){
  a = a.replace(/\s/g,'').toLowerCase();
  b = b.replace(/\s/g,'').toLowerCase();
  return a.includes(b) || b.includes(a);
}

// ===== SUBMIT =====
function submitPage(){
  if(submitted) return;

  let vocab = pages[currentPage];
  let score = 0;

  vocab.forEach((v,i)=>{
    let ans = document.getElementById("q"+i).value.trim();
    let fb = document.getElementById("fb"+i);

    if(similar(ans,v[1])){
      score++;
      totalScore++;
      fb.innerHTML="✔";
      fb.className="correct";
    }else{
      fb.innerHTML="✘ ("+v[1]+")";
      fb.className="wrong";

      wrongList.push({
        word: v[0],
        correct: v[1],
        your: ans || "-"
      });
    }
  });

  document.getElementById("result").innerText =
    "Page "+(currentPage+1)+" Score: "+score+"/"+vocab.length;

  submitted = true;
}

// ===== NEXT =====
function nextPage(){
  if(!submitted){
    alert("กรุณากด Submit ก่อน");
    return;
  }

  if(currentPage < pages.length - 1){
    currentPage++;
    loadPage();
  }else{
    finishExam();
  }
}

// ===== REDO =====
function restartPage(){
  if(submitted){
    totalScore -= pages[currentPage].length;
  }

  wrongList = [];

  submitted = false;
  loadPage();
}

// ===== RESET ALL =====
function resetAll(){
  currentPage = 0;
  totalScore = 0;
  wrongList = [];
  loadPage();
}

// ===== FINISH =====
function finishExam(){
  let total = pages.reduce((sum,p)=> sum + p.length, 0);
  let percent = (totalScore / total) * 100;

  let wrongHTML = "";

  if(wrongList.length > 0){
    wrongHTML += "<h3>ข้อที่ตอบผิด:</h3>";
    wrongList.forEach((w,i)=>{
      wrongHTML += `<p>${i+1}. ${w.word} → ${w.your} ❌ → ${w.correct}</p>`;
    });
  } else {
    wrongHTML = "<h3>ตอบถูกหมด 🔥</h3>";
  }

  document.getElementById("quiz").innerHTML = `
    <h2>เสร็จแล้ว 🎉</h2>
    <p>คะแนน: ${totalScore}/${total} (${percent.toFixed(1)}%)</p>
    ${wrongHTML}
  `;
}


// ===== ENTER FIX =====
document.addEventListener("keydown", function(e){
  if(e.key === "Enter" && !submitted){
    e.preventDefault();
    submitPage();
  }
});

// start
loadPage();
