// ===== CONTROL =====
let currentPage = 1;
let submitted = false;
let totalScore = 0;
let totalQuestions = 0;
let wrongList = [];

function getPageData(){
  if(currentPage === 1) return page1;
  if(currentPage === 2) return page2;
  if(currentPage === 3) return page3;
  if(currentPage === 4) return page4;
  if(currentPage === 5) return page5;
  if(currentPage === 6) return page6;
  if(currentPage === 7) return page7;
  return page8;
}

// ===== LOAD =====
function loadPage(){
  let vocab = getPageData();

  document.getElementById("title").innerText =
    "Vocabulary Quiz - Page " + currentPage;

  let html = "";

  vocab.forEach((v,i)=>{
    html += `
    <div class="item">
      <div class="word">${i+1}. ${v[0]} =</div>
      <input id="q${i}">
      <span id="fb${i}"></span>
    </div>`;
  });

  document.getElementById("quiz").innerHTML = html;
  document.getElementById("result").innerText = "";
  submitted = false;
}

// ===== CHECK =====
function similar(a,b){
  a = a.replace(/\s/g,'').toLowerCase();
  b = b.replace(/\s/g,'').toLowerCase();
  return a.includes(b) || b.includes(a);
}

// ===== SUBMIT =====
function submitPage(){
  if(submitted) return;

  let vocab = getPageData();
  let score = 0;

  vocab.forEach((v,i)=>{
    let ans = document.getElementById("q"+i).value.trim();
    let fb = document.getElementById("fb"+i);

    totalQuestions++;

    if(similar(ans,v[1])){
      score++;
      totalScore++;
      fb.innerHTML="✔";
      fb.className="correct";
    }else{
      fb.innerHTML="✘ ("+v[1]+")";
      fb.className="wrong";

      wrongList.push({
        word: v[0],
        correct: v[1],
        your: ans || "-"
      });
    }
  });

  document.getElementById("result").innerText =
    "Page "+currentPage+" Score: "+score+"/"+vocab.length;

  submitted = true;
}

// ===== NEXT =====
function nextPage(){
  if(!submitted){
    alert("กรุณากด Submit ก่อน");
    return;
  }

  if(currentPage < 8){ // ✅ แก้ตรงนี้
    currentPage++;
    loadPage();
  }else{
    finishExam();
  }
}

// ===== REDO หน้าเดิม =====
function restartPage(){
  submitted = false;
  loadPage();
}

// ===== FINISH =====
function finishExam(){
  let percent = (totalScore / totalQuestions) * 100;

  document.getElementById("quiz").innerHTML = `
    <h2>เสร็จแล้ว 🎉</h2>
    <p>คะแนน: ${totalScore}/${totalQuestions} (${percent.toFixed(1)}%)</p>
  `;
}

// ===== ENTER = SUBMIT =====
document.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    submitPage();
  }
});

// start
loadPage();
